<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客 - Ocean Breeze</title>
    <style>
        :root {
            --bg: #1a1008;
            --card: #241810;
            --accent: #f08c3c;
            --accent2: #f4a85c;
            --text: #ede4d8;
            --muted: #a89080;
            --border: #3a2818;
            --hover: #2c1c10;
            --hero-from: #140b04;
            --hero-via: #1f0f08;
            --hero-to: #1a1008;
            --glow: 240,140,60;
            --particle: 244,168,92;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background 0.4s, color 0.4s;
            min-height: 100vh;
        }

        /* === 顶部 === */
        .hero {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--heroFrom), var(--heroVia), var(--heroTo));
            padding: 60px 20px 50px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
        }
        .hero h1 {
            font-size: 2.8em;
            color: var(--accent2);
            text-shadow: 0 0 30px rgba(var(--glow),0.4);
            position: relative;
            z-index: 1;
        }
        .hero p {
            color: var(--muted);
            font-size: 1.1em;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        /* 粒子 canvas */
        #particles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* === 导航栏 === */
        nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 10px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
            transition: background 0.4s;
            flex-wrap: nowrap;
        }
        nav a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        nav a:hover { background: var(--accent); color: #fff; }

        /* 导航下拉 */
        .nav-dropdown { position: relative; }
        .nav-dropdown-toggle { cursor: pointer; }
        .nav-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: -10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px 0;
            min-width: 130px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            z-index: 150;
        }
        .nav-dropdown:hover .nav-dropdown-menu { display: block; }
        .nav-dropdown-menu a {
            display: block;
            padding: 8px 18px;
            border-radius: 0;
            white-space: nowrap;
            font-weight: 400;
        }

        /* 主题切换按钮 */
        .theme-btn {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 1.4em;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(var(--glow),0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(var(--glow),0.6);
        }

        /* === 主布局 === */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        /* === 左侧分录抽屉 === */
        .drawer-tab {
            position: fixed;
            left: 0; top: 50%;
            transform: translateY(-50%);
            z-index: 250;
            background: rgba(var(--glow), 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--accent2);
            border: 1px solid rgba(var(--glow), 0.3);
            border-left: none;
            padding: 16px 8px;
            border-radius: 0 12px 12px 0;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            writing-mode: vertical-rl;
            letter-spacing: 3px;
            box-shadow: 2px 0 20px rgba(var(--glow), 0.15);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }
        .drawer-tab:hover {
            background: rgba(var(--glow), 0.2);
            border-color: var(--accent);
            padding-right: 14px;
            box-shadow: 2px 0 28px rgba(var(--glow), 0.35);
            color: #fff;
        }
        .drawer-tab.open {
            left: 200px;
            border-radius: 0 12px 12px 0;
            background: rgba(var(--glow), 0.18);
            border-color: var(--accent);
        }
        /* 抽屉标签脉冲光点 */
        .drawer-tab::after {
            content: '';
            position: absolute;
            right: 4px; top: 50%;
            transform: translateY(-50%);
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent2);
            box-shadow: 0 0 6px var(--accent2);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 0.3; transform: translateY(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.3); }
        }

        .drawer-panel {
            position: fixed;
            left: -220px;
            top: 0;
            width: 200px;
            height: 100vh;
            z-index: 249;
            background: var(--card);
            border-right: 1px solid rgba(var(--glow), 0.25);
            padding: 80px 14px 30px 14px;
            overflow-y: auto;
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 6px 0 40px rgba(0,0,0,0.25);
        }
        .drawer-panel.open { left: 0; }

        .drawer-panel h3 {
            color: var(--accent2);
            margin-bottom: 14px;
            font-size: 1.05em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .drawer-panel .cat-item {
            display: block;
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 5px;
            border-radius: 10px;
            background: transparent;
            color: var(--text);
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            text-align: left;
            transition: all 0.25s;
        }
        .drawer-panel .cat-item:hover {
            background: rgba(var(--glow), 0.08);
            border-color: rgba(var(--glow), 0.2);
            color: var(--accent2);
        }
        .drawer-panel .cat-item.active {
            background: rgba(var(--glow), 0.15);
            border-color: var(--accent);
            color: var(--accent2);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .drawer-panel { width: 170px; left: -180px; }
            .drawer-tab.open { left: 170px; }
        }

        .drawer-panel h3 {
            color: var(--accent2);
            margin-bottom: 14px;
            font-size: 1.05em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .drawer-panel .cat-item {
            display: block;
            width: 100%;
            padding: 9px 14px;
            margin-bottom: 4px;
            border-radius: 10px;
            background: var(--hover);
            color: var(--accent);
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            text-align: left;
            transition: all 0.25s;
        }
        .drawer-panel .cat-item:hover,
        .drawer-panel .cat-item.active {
            background: var(--accent);
            color: #fff;
        }

        /* 抽屉遮罩 */
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 248;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
        }
        .drawer-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* === 文章卡片 === */
        .post {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            margin-bottom: 24px;
            transition: transform 0.3s, box-shadow 0.3s, background 0.4s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .post:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(var(--glow),0.25);
        }
        .post::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--accent);
            border-radius: 4px 0 0 4px;
        }
        .post .date {
            color: var(--muted);
            font-size: 0.85em;
            margin-bottom: 6px;
        }
        .post h2 {
            color: var(--accent2);
            margin-bottom: 10px;
            font-size: 1.4em;
        }
        .post .tags { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .post .tags span {
            background: var(--hover);
            color: var(--accent);
            padding: 3px 12px;
            border-radius: 14px;
            font-size: 0.8em;
            font-weight: 600;
            transition: background 0.3s;
        }
        .post .tags span:hover { background: var(--accent); color: #fff; }

        /* === 侧边栏 === */
        .sidebar > * {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 20px;
            transition: background 0.4s;
        }
        .sidebar h3 {
            color: var(--accent2);
            margin-bottom: 14px;
            font-size: 1.1em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        /* 搜索 */
        #searchBox {
            width: 100%;
            padding: 10px 14px;
            border-radius: 22px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.95em;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
        }
        #searchBox:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(var(--glow),0.25);
        }

        /* 标签云 */
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-cloud .tag {
            background: var(--hover);
            color: var(--accent);
            padding: 5px 14px;
            border-radius: 16px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .tag-cloud .tag:hover, .tag-cloud .tag.active {
            background: var(--accent);
            color: #fff;
        }

        /* 回到顶部 */
        .back-to-top {
            position: fixed;
            bottom: 90px; right: 30px;
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 1.2em;
            cursor: pointer;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }
        .back-to-top.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .back-to-top:hover { transform: translateY(-3px); }

        /* 座右铭编辑按钮 */
        .quote-edit-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.75em;
            cursor: pointer;
            padding: 4px 14px;
            border-radius: 14px;
            transition: all 0.3s;
            opacity: 0.5;
            position: relative;
            z-index: 2;
        }
        .quote-edit-btn:hover { opacity: 1; color: var(--accent); border-color: var(--accent); }

        /* 座右铭管理弹窗 */
        .quote-list { max-height: 260px; overflow-y: auto; margin-bottom: 14px; }
        .quote-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 8px;
            background: var(--hover);
            font-size: 0.9em;
        }
        .quote-item span { flex: 1; color: var(--text); }
        .quote-item button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.85em;
            transition: color 0.2s;
        }
        .quote-item button:hover { color: #e74c3c; }

        /* 打字效果 */
        #typing-text {
            color: var(--accent);
            font-weight: 600;
            border-right: 2px solid var(--accent);
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* 阅读进度条 */
        .progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 3px;
            background: var(--accent);
            z-index: 300;
            transition: width 0.1s;
        }

        /* === 写文章按钮 === */
        .new-post-btn {
            position: fixed;
            bottom: 30px; left: 30px;
            width: 52px; height: 52px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 1.8em;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(var(--glow),0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .new-post-btn:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 28px rgba(var(--glow),0.6);
        }

        /* === 模态弹窗 === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            transition: background 0.4s;
            transform: translateY(20px);
            transition: transform 0.3s, background 0.4s;
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .modal h2 {
            color: var(--accent2);
            margin-bottom: 20px;
            font-size: 1.4em;
        }
        .modal label {
            display: block;
            color: var(--muted);
            font-size: 0.9em;
            margin-bottom: 4px;
            margin-top: 14px;
        }
        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.95em;
            outline: none;
            font-family: inherit;
            transition: border 0.3s, box-shadow 0.3s;
        }
        .modal input:focus, .modal select:focus, .modal textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(var(--glow),0.2);
        }
        .modal textarea { resize: vertical; min-height: 120px; }
        .modal .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 22px;
            justify-content: flex-end;
        }
        .modal .btn {
            padding: 10px 24px;
            border-radius: 22px;
            border: none;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .modal .btn-primary:hover { filter: brightness(1.15); }
        .modal .btn-cancel {
            background: var(--hover);
            color: var(--muted);
        }
        .modal .btn-cancel:hover { background: var(--border); }

        /* 操作按钮组 */
        .post-actions {
            position: absolute;
            top: 12px; right: 16px;
            display: flex;
            gap: 8px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .post:hover .post-actions { opacity: 1; }
        .action-btn {
            background: var(--hover);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 1em;
            cursor: pointer;
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .edit-action:hover { color: var(--accent); border-color: var(--accent); }
        .del-action:hover { color: #e74c3c; border-color: #e74c3c; }

        /* === Emoji 选择器 === */
        .emoji-picker-wrap { position: relative; }
        .emoji-trigger {
            width: 42px; height: 37px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border 0.3s;
        }
        .emoji-trigger:hover { border-color: var(--accent); }
        .emoji-panel {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
            z-index: 500;
            display: none;
            width: 310px;
            max-height: 260px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .emoji-panel.active { display: block; }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 4px;
        }
        .emoji-grid span {
            width: 28px; height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .emoji-grid span:hover { background: var(--hover); transform: scale(1.2); }

        /* 页脚 */
        /* === 照片墙 === */
        #photoSection { display: none; }
        #photoSection.active { display: block; }
        #blogSection.hidden { display: none; }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .photo-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4/3;
            background: var(--hover);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease;
            z-index: 1;
        }
        .photo-card:hover {
            transform: scale(1.18);
            box-shadow: 0 16px 40px rgba(var(--glow),0.4);
            z-index: 10;
        }
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .photo-card .photo-edit {
            position: absolute;
            top: 8px; right: 38px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: #fff;
            width: 26px; height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8em;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 5;
        }
        .photo-card:hover .photo-edit { opacity: 1; }
        .photo-card .photo-edit:hover { background: var(--accent); }
        .photo-card .photo-del {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: #fff;
            width: 26px; height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8em;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 5;
        }
        .photo-card:hover .photo-del { opacity: 1; }
        .photo-card .photo-del:hover { background: #e74c3c; }
        .photo-card .photo-caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 8px 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: #fff;
            font-size: 0.85em;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .photo-card:hover .photo-caption { opacity: 1; }
        .photo-card .photo-tags {
            position: absolute;
            top: 8px; left: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 5;
        }
        .photo-card:hover .photo-tags { opacity: 1; }
        .photo-card .photo-tags span {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }


        /* 灯箱 */
        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }
        .lightbox-close {
            position: absolute;
            top: 20px; right: 30px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2em;
            cursor: pointer;
            z-index: 501;
        }
        .lightbox-caption {
            position: absolute;
            bottom: 30px;
            color: #ccc;
            font-size: 1em;
        }

        /* 照片文件上传 */
        .photo-upload-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 4px;
        }
        .photo-upload-row input[type="file"] {
            display: none;
        }
        .photo-upload-row .photo-file-btn {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 22px;
            background: var(--hover);
            color: var(--accent);
            border: 1px dashed var(--border);
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .photo-upload-row .photo-file-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            border-style: solid;
        }
        .photo-file-name {
            color: var(--muted);
            font-size: 0.8em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .photo-preview {
            margin: 10px 0;
            text-align: center;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg);
        }
        .photo-preview img {
            max-width: 100%;
            max-height: 180px;
            display: block;
            object-fit: contain;
            margin: 0 auto;
        }

        /* 添加照片按钮 */
        .add-photo-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 4/3;
            border-radius: 10px;
            border: 2px dashed var(--border);
            background: var(--hover);
            color: var(--muted);
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s;
        }
        .add-photo-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--card);
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--muted);
            font-size: 0.9em;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <!-- 阅读进度条 -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- 顶部 -->
    <header class="hero">
        <canvas id="particles"></canvas>
        <h1 id="blogTitle">🌊 Ocean Breeze</h1>
        <p>「 <span id="typing-text"></span> 」</p>
        <p><button class="quote-edit-btn" id="quoteEditBtn" title="编辑座右铭">✎ 编辑座右铭</button></p>
    </header>

    <!-- 导航 -->
    <nav id="navBar">
        <!-- JS 动态渲染 -->
    </nav>

    <!-- 左侧分录抽屉触发标签 -->
    <div class="drawer-tab" id="drawerTab" onclick="toggleDrawer()" title="分录">分 录</div>

    <!-- 左侧分录抽屉面板 -->
    <div class="drawer-panel" id="drawerPanel">
        <h3>📂 分录</h3>
        <div id="categoryFilters">
            <!-- JS 动态渲染 -->
        </div>
    </div>

    <!-- 抽屉遮罩 -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>

    <!-- 主内容 -->
    <div class="container">
        <!-- 博客视图 -->
        <main id="blogSection">
            <div id="postList">
                <!-- JS 动态渲染 -->
            </div>
        </main>

        <!-- 照片墙视图 -->
        <main id="photoSection">
            <div class="photo-grid" id="photoGrid">
                <!-- JS 动态渲染 -->
            </div>
        </main>

        <!-- 右侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <!-- 搜索 -->
            <div>
                <h3 id="searchLabel">🔍 搜索文章</h3>
                <input type="text" id="searchBox" placeholder="输入关键词搜索…" oninput="handleSearch()">
            </div>

            <!-- 标签云 -->
            <div>
                <h3 id="tagCloudLabel">🏷️ 标签云</h3>
                <div class="tag-cloud" id="tagCloud">
                    <!-- JS 动态渲染 -->
                </div>
            </div>

            <!-- 主题切换 -->
            <div>
                <h3>🎨 主题风格</h3>
                <div style="display:flex;gap:8px;margin-bottom:12px;" id="themePicker">
                    <!-- JS 动态渲染 -->
                </div>
            </div>

            <!-- 统计 -->
            <div>
                <h3 id="statsLabel">📊 博客统计</h3>
                <p style="color:var(--muted);">📄 文章数：<strong id="statPosts" style="color:var(--accent);">0</strong></p>
                <p style="color:var(--muted);">🏷️ 标签数：<strong id="statTags" style="color:var(--accent);">0</strong></p>
                <p style="color:var(--muted);" id="visitorCount">👀 今日访客：<strong style="color:var(--accent);">--</strong></p>
            </div>

            <!-- 分类管理 -->
            <div>
                <h3 id="catMgmtLabel">📂 分类管理</h3>
                <div id="categoryList" style="margin-bottom:10px;">
                    <!-- JS 动态渲染 -->
                </div>
                <div>
                    <input type="text" id="newCatName" placeholder="新分类名称" style="width:100%;padding:7px 10px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85em;outline:none;">
                    <div style="display:flex;gap:6px;">
                        <div class="emoji-picker-wrap">
                            <button id="emojiBtn" class="emoji-trigger" title="选择图标">😊</button>
                            <div class="emoji-panel" id="emojiPanel">
                                <div class="emoji-grid" id="emojiGrid"></div>
                            </div>
                        </div>
                        <button id="addCatBtn" style="flex:1;padding:7px 12px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:0.85em;cursor:pointer;white-space:nowrap;">+ 添加</button>
                    </div>
                </div>
                <p style="color:var(--muted);font-size:0.7em;margin-top:6px;">点 emoji 按钮选择图标，输入名称后点"添加"</p>
            </div>
        </aside>
    </div>

    <footer>
        <p id="blogFooter">© 2026 Ocean Breeze · 用 ❤️ 和 ☕ 搭建</p>
    </footer>

    <!-- 按钮 -->
    <button class="new-post-btn" id="newPostBtn" title="写文章">✎</button>
    <button class="theme-btn" id="themeBtn" title="切换主题">🌓</button>
    <button class="back-to-top" id="backTop" title="回到顶部">⬆</button>

    <!-- 写文章弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">✍️ 写新文章</h2>
            <input type="hidden" id="editId" value="">
            <label>标题</label>
            <input type="text" id="newTitle" placeholder="输入文章标题…">
            <label>分类</label>
            <select id="newCategory">
                <option value="tech">💻 技术</option>
                <option value="life">📷 生活</option>
                <option value="notes">📝 随笔</option>
            </select>
            <label>标签（用逗号分隔，例如：JavaScript, 教程, 前端）</label>
            <input type="text" id="newTags" placeholder="JavaScript, 教程">
            <label>摘要 / 正文</label>
            <textarea id="newContent" placeholder="写点什么…"></textarea>
            <div class="btn-row">
                <button class="btn btn-cancel" id="cancelBtn">取消</button>
                <button class="btn btn-primary" id="saveBtn">✨ 发布文章</button>
            </div>
        </div>
    </div>

    <!-- 座右铭管理弹窗 -->
    <div class="modal-overlay" id="quoteOverlay">
        <div class="modal">
            <h2>💬 编辑座右铭</h2>
            <div class="quote-list" id="quoteList"></div>
            <div style="display:flex;gap:6px;">
                <input type="text" id="newQuote" placeholder="输入新的座右铭…" style="flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.95em;outline:none;">
                <button class="btn btn-primary" id="addQuoteBtn">+ 添加</button>
            </div>
            <div class="btn-row">
                <button class="btn btn-cancel" id="quoteCancelBtn">完成</button>
            </div>
        </div>
    </div>

    <!-- 添加照片弹窗 -->
    <div class="modal-overlay" id="photoOverlay">
        <div class="modal">
            <h2>📷 添加照片</h2>
            <label>照片名称</label>
            <input type="text" id="photoName" placeholder="给照片取个名字…">
            <label>分类</label>
            <select id="photoCategory">
                <!-- JS 动态渲染 -->
            </select>
            <label>标签（用逗号分隔）</label>
            <input type="text" id="photoTags" placeholder="风景, 旅行, 自然">
            <label>选择文件</label>
            <div class="photo-upload-row">
                <input type="file" id="photoFile" accept="image/*" onchange="handlePhotoFile()">
                <label for="photoFile" class="photo-file-btn">📁 从本地选择</label>
                <span class="photo-file-name" id="photoFileName">未选择文件</span>
            </div>
            <div class="photo-preview" id="photoPreview" style="display:none;">
                <img id="photoPreviewImg" src="" alt="预览">
            </div>
            <label>或 图片链接</label>
            <input type="text" id="photoUrl" placeholder="https://example.com/photo.jpg">
            <p style="color:var(--muted);font-size:0.75em;margin-top:4px;">可从本地文件选择，或粘贴网络图片链接</p>
            <div class="btn-row">
                <button class="btn btn-cancel" id="photoCancelBtn">取消</button>
                <button class="btn btn-primary" id="photoSaveBtn">✨ 添加照片</button>
            </div>
        </div>
    </div>

    <!-- 灯箱 -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <img src="" alt="" id="lightboxImg">
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>


    <script src="js/theme.js"></script>
    <script src="js/blog.js"></script>
    <script src="js/photos.js"></script>
    <script>
        // ============ 初始化 ============
        renderNav();
        renderCategoryList();
        renderCategoryFilters();
        renderPosts();
        renderTagCloud();
    </script>
</body>
</html>
